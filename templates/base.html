<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <title>Evidencija Brodova</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Evidencija Brodova</a>
            <div>
                <a href="{{ url_for('pocetna') }}" class="btn btn-outline-light btn-sm">Početna</a>
                <a href="{{ url_for('pregled_brodova') }}" class="btn btn-outline-light btn-sm">Brodovi</a>
                <a href="{{ url_for('dodaj_brod') }}" class="btn btn-outline-light btn-sm">Dodaj brod</a>
                <a href="{{ url_for('statistika') }}" class="btn btn-outline-light btn-sm">Statistika</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>
    {% block scripts %}
    {% endblock %}
</body>
</html>
