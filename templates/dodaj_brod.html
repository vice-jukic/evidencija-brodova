{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">Dodaj novi brod</h1>

<form method="POST">

    <div class="mb-3">
        <label class="form-label">Naziv</label>
        <input type="text" name="naziv" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Tip</label>
        <input type="text" name="tip" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Duljina (m)</label>
        <input type="number" step="0.1" name="duljina" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Godina proizvodnje</label>
        <input type="number" name="godina" class="form-control" required>
    </div>

    <div class="form-check">
        <input type="checkbox" id="jedra" name="ima_jedra" class="form-check-input">
        <label for="jedra" class="form-check-label">Ima jedra</label>
    </div>

    <div class="form-check mb-3">
        <input type="checkbox" id="tende" name="ima_tende" class="form-check-input">
        <label for="tende" class="form-check-label">Ima tende</label>
    </div>

    <div class="mb-3">
        <label class="form-label">Oprema</label>
        <textarea name="oprema" class="form-control" rows="3"></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label">Zadnji servis</label>
        <input type="date" name="zadnji_servis" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Opis</label>
        <textarea name="opis" class="form-control" rows="4"></textarea>
    </div>

    <button type="submit" class="btn btn-success">
        Spremi
    </button>

    <a href="/brodovi" class="btn btn-secondary">
        Odustani
    </a>

</form>
<hr>

{% endblock %}
