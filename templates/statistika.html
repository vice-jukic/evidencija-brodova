{% extends "base.html" %}

{% block content %}

<h1 class="mb-4">Statistika</h1>

<canvas id="tipoviChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const labels = {{ tipovi.keys() | list | tojson | safe }};
    const data = {{ tipovi.values() | list | tojson | safe}};

    new Chart(document.getElementById("tipoviChart"), {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Broj brodova po tipu",
                data: data
            }]
        }
    });
</script>

<h2 class="mt-5">Brodovi kojima servis najduže nije obavljen</h2>

<table class="table table-striped">
    <thead>
        <tr>
            <th>Naziv</th>
            <th>Tip</th>
            <th>Zadnji servis</th>
        </tr>
    </thead>

    <tbody>
        {% for brod in brodovi_za_servis %}
        <tr>
            <td>{{ brod.naziv }}</td>
            <td>{{ brod.tip }}</td>
            <td>{{ formatiraj_datum(brod.zadnji_servis) }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<h2 class="mt-5">Status servisa</h2>

<canvas id="servisChart"></canvas>

<script>
    const servisLabels = [
        "Servis unutar godine",
        "Servis stariji od godinu dana",
        "Nema evidentiran servis"
    ];

    const servisData = [
        {{ servis_u_redu }},
        {{ servis_kasni }},
        {{ bez_servisa }}
    ];

    new Chart(document.getElementById("servisChart"), {
        type: "pie",
        data: {
            labels: servisLabels,
            datasets: [{
                data: servisData
            }]
        }
    });
</script>
<h2 class="mt-5">Starost brodova</h2>

<canvas id="starostChart"></canvas>

<script>
    const starostLabels = [
        "Do 10 godina",
        "10 - 20 godina",
        "Više od 20 godina"
    ];

    const starostData = [
        {{ mladi_brodovi }},
        {{ srednji_brodovi }},
        {{ stari_brodovi }}
    ];

    new Chart(document.getElementById("starostChart"), {
        type: "pie",
        data: {
            labels: starostLabels,
            datasets: [{
                data: starostData
            }]
        }
    });
</script>

{% endblock%}
